name: claude-code-webui-buildx

on:
  schedule:
        - cron: "45 8 * * Sun"
  workflow_dispatch:

jobs:
  claude-code-webui-build:
    runs-on: ubuntu-latest
    steps:
      -
        name: clone https://github.com/heywoodlh/dockerfiles
        uses: actions/checkout@master
        with:
          name: heywoodlh/dockerfiles
          repository: heywoodlh/dockerfiles
          path: ./dockerfiles
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@master
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master
      -
        name: Login to DockerHub
        uses: docker/login-action@master
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build heywoodlh/claude-code-webui:latest locally
        uses: docker/build-push-action@master
        with:
          context: ./dockerfiles/claude-code-webui
          file: ./dockerfiles/claude-code-webui/Dockerfile
          load: true
          target: test
          tags: heywoodlh/claude-code-webui:test
      -
        name: Get claude-code-webui version
        run: |
          echo version=$(docker run -i --rm heywoodlh/claude-code-webui:test --version) >> $GITHUB_ENV
      -
        name: Build and push heywoodlh/claude-code-webui:latest
        uses: docker/build-push-action@master
        with:
          context: ./dockerfiles/claude-code-webui
          file: ./dockerfiles/claude-code-webui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: heywoodlh/claude-code-webui:latest,heywoodlh/claude-code-webui:${{ env.version }}
