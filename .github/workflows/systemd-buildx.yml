name: systemd-buildx

on:
  schedule:
    - cron: "15 15 * * Sat"
  workflow_dispatch:

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: clone https://tangled.org/heywoodlh.io/dockerfiles
        run: |
          git clone https://tangled.org/heywoodlh.io/dockerfiles dockerfiles

      - name: Upload dockerfiles artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockerfiles
          path: dockerfiles/

  test:
    runs-on: ubuntu-latest
    needs: checkout
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.ubuntu
          - Dockerfile.debian
          - Dockerfile.fedora
          - Dockerfile.archlinux
    steps:
      - name: Download dockerfiles artifact
        uses: actions/download-artifact@v4
        with:
          name: dockerfiles
          path: dockerfiles/

      - name: Fix script permissions
        run: chmod +x dockerfiles/systemd/*.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test ${{ matrix.dockerfile }}
        run: |
          pushd ./dockerfiles/systemd
          ./test-systemd.sh ${{ matrix.dockerfile }}
          popd

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target:
          - ubuntu
          - debian
          - fedora
          - archlinux
    steps:
      - name: Download dockerfiles artifact
        uses: actions/download-artifact@v4
        with:
          name: dockerfiles
          path: dockerfiles/

      - name: Fix script permissions
        run: chmod +x dockerfiles/systemd/*.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push heywoodlh/systemd-${{ matrix.target }}
        run: |
          cd dockerfiles/systemd
          ./build.sh ${{ matrix.target }}
