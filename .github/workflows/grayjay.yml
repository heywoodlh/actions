name: grayjay-buildx

on:
  schedule:
        - cron: "30 6 * * Tue"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Clone grayjay-desktop-container
        uses: actions/checkout@master
        with:
          name: heywoodlh/dockerfiles
          repository: heywoodlh/dockerfiles
          path: ./dockerfiles
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Get current month
        run: echo date=$(date +%Y_%m) >> $GITHUB_ENV
      -
        name: Build and push heywoodlh/grayjay
        uses: docker/build-push-action@v2
        with:
          context: ./dockerfiles/grayjay
          file: ./dockerfiles/grayjay/Dockerfile
          platforms: linux/amd64
          push: true
          tags: heywoodlh/grayjay:latest,heywoodlh/grayjay:${{ env.date }}
